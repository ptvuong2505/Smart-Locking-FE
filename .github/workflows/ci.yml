name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Node project
        id: detect
        shell: bash
        run: |
          if [ ! -f package.json ]; then
            echo "has_project=false" >> "$GITHUB_OUTPUT"
            echo "No package.json found. Skipping build until the Vite app is scaffolded."
            exit 0
          fi

          if [ -f pnpm-lock.yaml ]; then
            package_manager="pnpm"
          elif [ -f yarn.lock ]; then
            package_manager="yarn"
          else
            package_manager="npm"
          fi

          echo "has_project=true" >> "$GITHUB_OUTPUT"
          echo "package_manager=$package_manager" >> "$GITHUB_OUTPUT"
          echo "Detected package manager: $package_manager"

      - name: Setup Node.js
        if: steps.detect.outputs.has_project == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ${{ steps.detect.outputs.package_manager }}

      - name: Enable Corepack
        if: steps.detect.outputs.has_project == 'true' && steps.detect.outputs.package_manager != 'npm'
        run: corepack enable

      - name: Install dependencies
        if: steps.detect.outputs.has_project == 'true'
        env:
          PACKAGE_MANAGER: ${{ steps.detect.outputs.package_manager }}
        shell: bash
        run: |
          case "$PACKAGE_MANAGER" in
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
            npm)
              if [ -f package-lock.json ]; then
                npm ci
              else
                npm install
              fi
              ;;
          esac

      - name: Lint, test, and build
        if: steps.detect.outputs.has_project == 'true'
        env:
          PACKAGE_MANAGER: ${{ steps.detect.outputs.package_manager }}
        shell: bash
        run: |
          has_script() {
            node -e "const pkg = require('./package.json'); process.exit(pkg.scripts && pkg.scripts[process.argv[1]] ? 0 : 1)" "$1"
          }

          run_script() {
            local script_name="$1"

            if ! has_script "$script_name"; then
              echo "No '$script_name' script found. Skipping."
              return 0
            fi

            case "$PACKAGE_MANAGER" in
              pnpm)
                pnpm "$script_name"
                ;;
              yarn)
                yarn "$script_name"
                ;;
              npm)
                npm run "$script_name"
                ;;
            esac
          }

          run_script lint
          run_script test
          run_script build

  notify:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CICD }}
          JOB_STATUS: ${{ needs.build.result }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ.get("DISCORD_WEBHOOK", "").strip()
          if not webhook:
              print("DISCORD_WEBHOOK_CICD is not configured. Skipping Discord notification.")
              raise SystemExit(0)

          status = os.environ["JOB_STATUS"]
          repo = os.environ["REPOSITORY"]
          ref_name = os.environ["REF_NAME"]
          actor = os.environ["ACTOR"]
          sha = os.environ["SHA"][:7]
          run_url = os.environ["RUN_URL"]

          payload = {
              "content": (
                  f"CI/CD **{status.upper()}** for `{repo}`\n"
                  f"Branch: `{ref_name}`\n"
                  f"Commit: `{sha}` by `{actor}`\n"
                  f"Run: {run_url}"
              )
          }

          request = urllib.request.Request(
              webhook,
              data=json.dumps(payload).encode("utf-8"),
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=15) as response:
              print(f"Discord notification sent: HTTP {response.status}")
          PY

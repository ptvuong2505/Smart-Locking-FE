name: Discord CI Notify

on:
  push:
    branches:
      - main
      - dev

  pull_request:
    branches:
      - main
      - dev
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
      - closed

  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_CICD }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          BASE_REF: ${{ github.base_ref }}
          SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_CICD is empty. Please add it in GitHub Secrets."
            exit 0
          fi

          if [[ "$DISCORD_WEBHOOK" == */github ]]; then
            echo "ERROR: This workflow uses normal Discord webhook URL, not /github URL."
            echo "Please remove /github from DISCORD_WEBHOOK_CICD."
            exit 1
          fi

          SHORT_SHA="${SHA:0:7}"

          if [ -n "$PR_TITLE" ]; then
            SUMMARY="$PR_TITLE"
            EVENT_URL="$PR_URL"
          elif [ -n "$COMMIT_MESSAGE" ]; then
            SUMMARY="$(echo "$COMMIT_MESSAGE" | head -n 1)"
            EVENT_URL="$COMMIT_URL"
          else
            SUMMARY="Manual workflow run"
            EVENT_URL="$RUN_URL"
          fi

          if [ -n "$EVENT_ACTION" ]; then
            TITLE="$REPOSITORY: $EVENT_NAME / $EVENT_ACTION"
          else
            TITLE="$REPOSITORY: $EVENT_NAME"
          fi

          if [ -n "$BASE_REF" ]; then
            TARGET_LINE="Target: \`$BASE_REF\`\n"
          else
            TARGET_LINE=""
          fi

          cat > payload.json <<EOF
          {
            "content": "GitHub **${EVENT_NAME^^}** notification for \`$REPOSITORY\`",
            "embeds": [
              {
                "title": "$TITLE",
                "url": "$EVENT_URL",
                "description": "Actor: \`$ACTOR\`\nBranch: \`$REF_NAME\`\n${TARGET_LINE}Commit: \`$SHORT_SHA\`\nRun: $RUN_URL",
                "fields": [
                  {
                    "name": "Summary",
                    "value": "$SUMMARY"
                  }
                ],
                "color": 3447003
              }
            ]
          }
          EOF

          echo "Sending Discord notification..."

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Actions-Discord-Notifier" \
            --data @payload.json \
            "$DISCORD_WEBHOOK")

          echo "Discord HTTP code: $HTTP_CODE"
          cat response.txt || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Discord notification failed."
            exit 1
          fi

          echo "Discord notification sent successfully."
